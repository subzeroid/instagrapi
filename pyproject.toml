[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "instagrapi"
version = "2.4.1"
authors = [
    {name = "Mark Subzeroid", email = "143403577+subzeroid@users.noreply.github.com"}
]
description = "Fast and effective Instagram Private API wrapper"
readme = {file = "README.md", content-type = "text/markdown"}
license = "MIT"
requires-python = ">=3.9"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
keywords = [
    "instagram private api",
    "instagram-private-api",
    "instagram api",
    "instagram-api",
    "instagram",
    "instagram-scraper",
    "instagram-client",
    "instagram-stories",
    "instagram-feed",
    "instagram-reels",
    "instagram-insights",
    "downloader",
    "uploader",
    "videos",
    "photos",
    "albums",
    "igtv",
    "reels",
    "stories",
    "pictures",
    "instagram-user-photos",
    "instagram-photos",
    "instagram-metadata",
    "instagram-downloader",
    "instagram-uploader",
    "instagram-note",
]
dependencies = [
    "requests==2.32.5; python_version < '3.10'",
    "requests==2.33.0; python_version >= '3.10'",
    "PySocks==1.7.1",
    "pydantic==2.13.0",
    "moviepy==1.0.3",
    "pycryptodomex==3.23.0",
]

[project.urls]
Homepage = "https://github.com/subzeroid/instagrapi"
Repository = "https://github.com/subzeroid/instagrapi"

[project.optional-dependencies]
test = [
    "flake8==7.3.0",
    "Pillow==12.2.0",
    "isort==7.0.0",
    "bandit==1.8.6",
    "mike==2.2.0",
    "markdown-include==0.8.1",
    "mkdocs-material==9.7.6",
    "mkdocs-minify-html-plugin>=0.3.1",
    "mkdocstrings==0.30.1",
    "pytest-xdist==3.8.0",
    "pytest==8.4.2; python_version < '3.10'",
    "pytest==9.0.3; python_version >= '3.10'",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["instagrapi*"]
